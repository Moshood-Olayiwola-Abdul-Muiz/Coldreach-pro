[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/auth/url"
  to = "/.netlify/functions/api-auth-url"
  status = 200

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/check-replies"
  to = "/.netlify/functions/check-replies"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
